<!DOCTYPE html>
<html lang="en" data-theme="light" data-color-mode="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filename }} - Markdown Viewer</title>

    <!-- GitHub Markdown CSS (light theme only) -->
    <link rel="stylesheet" href="/static/css/lib/github-markdown-light.min.css">

    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="/static/css/lib/github-highlight.min.css">

    <!-- Pygments CSS for codehilite extension -->
    <link rel="stylesheet" href="/static/css/lib/pygments-github.min.css">

    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>{{ filename }}</h1>
        </header>

        <main class="markdown-body">
            {{ content | safe }}
        </main>
    </div>

    <!-- Mermaid.js -->
    <script src="/static/js/lib/mermaid.min.js"></script>

    <!-- SVG Pan Zoom -->
    <script src="/static/js/lib/svg-pan-zoom.min.js"></script>

    <!-- Highlight.js -->
    <script src="/static/js/lib/highlight.min.js"></script>

    <!-- Custom viewer JavaScript -->
    <script src="/static/js/viewer.js"></script>
</body>
</html>
